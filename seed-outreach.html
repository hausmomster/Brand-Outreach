function seed() {
  const existing = JSON.parse(localStorage.getItem('outreach') || '[]');
  const existingIds = new Set(existing.map(e => e.id));
  const existingNames = new Set(existing.map(e => e.brandName.toLowerCase()));

  const toAdd = SEED_ENTRIES.filter(e =>
    !existingIds.has(e.id) && !existingNames.has(e.brandName.toLowerCase())
  );

  if (!toAdd.length) {
    document.getElementById('statusTitle').textContent = 'Already up to date';
    document.getElementById('statusMsg').textContent = 'All outreach entries are already in your pipeline.';
  } else {
    const merged = [...existing, ...toAdd];
    localStorage.setItem('outreach', JSON.stringify(merged));
    document.getElementById('statusTitle').textContent = `${toAdd.length} entries added`;
    document.getElementById('statusMsg').textContent = `Redirecting to your pipeline…`;
  }

  setTimeout(() => { window.location.href = 'outreach.html'; }, 1800);
}

seed();
</script>
