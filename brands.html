      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
    .chip {
      padding: 6px 16px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Jost', sans-serif;
    }
    .chip:hover { border-color: var(--gold); color: var(--text); }
    .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .search-wrap { position: relative; min-width: 220px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-light); font-size: 14px; pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 13px;
      outline: none;
      color: var(--text);
    }
    .search-input:focus { border-color: var(--gold); }
    .results-count {
      font-size: 13px;
      color: var(--text-light);
      white-space: nowrap;
    }

    /* brand cards grid */
    .brands-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 40px 0 80px;
    }
    .brand-card {
      border: 1px solid var(--border);
      padding: 0;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .brand-card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .brand-card-top {
      padding: 24px 24px 16px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .brand-logo {
      width: 48px; height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .brand-meta { flex: 1; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .brand-country {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }
    .brand-category-chip {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      background: var(--surface);
      color: var(--text-mid);
      border: 1px solid var(--border);
    }
    .brand-card-body {
      padding: 0 24px 16px;
      flex: 1;
    }
    .brand-desc {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.6;
    }
    .brand-why {
      margin-top: 10px;
      font-size: 12px;
      color: var(--sage);
      line-height: 1.5;
      display: flex;
      gap: 6px;
    }
    .brand-why::before {
      content: '✦';
      flex-shrink: 0;
      font-size: 10px;
      margin-top: 1px;
    }
    .fit-dots {
      display: flex; gap: 3px; margin-top: 12px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
    .dot.filled { background: var(--gold); }
    .brand-card-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .brand-ig {
      font-size: 12px;
      color: var(--text-light);
    }
    .add-btn {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Jost', sans-serif;
      white-space: nowrap;

    .add-btn.added { background: var(--sage); color: #fff; border-color: var(--sage); }

      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
      font-size: 15px;
      grid-column: 1/-1;
    }

      .brands-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .brands-grid { grid-template-columns: 1fr; }
    }

let activeCategory = 'all';
let searchTerm = '';
let selectedBrand = null;

function getOutreachMap() {
  const outreach = JSON.parse(localStorage.getItem('outreach') || '[]');
  const map = {};
  outreach.forEach(o => { if (o.brandId) map[o.brandId] = true; });
  return map;
}

function fitDots(score) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="dot${i <= score ? ' filled' : ''}"></span>`;
  }
  return html;
}

function renderBrands() {
  const grid = document.getElementById('brandsGrid');
  const outreachMap = getOutreachMap();

  let filtered = BRANDS.filter(b => {
    const catMatch = activeCategory === 'all' || b.category === activeCategory;
    const search = searchTerm.toLowerCase();
    const searchMatch = !search ||
      b.name.toLowerCase().includes(search) ||
      b.category.toLowerCase().includes(search) ||
      b.desc.toLowerCase().includes(search) ||
      b.country.toLowerCase().includes(search);
    return catMatch && searchMatch;
  });

  document.getElementById('resultsCount').textContent = `${filtered.length} brand${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No brands match your filter — try a different category or search term.</div>';
    return;
  }

  grid.innerHTML = filtered.map(b => {
    const inPipeline = outreachMap[b.id];
    return `<div class="brand-card" onclick="openAddModal(${b.id})">
      <div class="brand-card-top">
        <div class="brand-logo">${b.emoji}</div>
        <div class="brand-meta">
          <div class="brand-name">${b.name}</div>
          <div class="brand-country">${b.country}</div>
        </div>
        <span class="brand-category-chip">${b.category.split(' & ')[0]}</span>
      </div>
      <div class="brand-card-body">
        <p class="brand-desc">${b.desc}</p>
        <p class="brand-why">${b.why}</p>
        <div class="fit-dots" title="Aesthetic fit score">${fitDots(b.fit)}</div>
      </div>
      <div class="brand-card-footer">
        <span class="brand-ig">${b.instagram} · ${b.ig_followers}</span>
        <button class="add-btn${inPipeline ? ' added' : ''}" onclick="event.stopPropagation();openAddModal(${b.id})">
          ${inPipeline ? '✓ In Pipeline' : '+ Outreach'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function openAddModal(brandId) {
  selectedBrand = BRANDS.find(b => b.id === brandId);
  if (!selectedBrand) return;
  document.getElementById('modalBrandName').textContent = selectedBrand.name;
  document.getElementById('modalBrandDesc').textContent =
    `${selectedBrand.country} · ${selectedBrand.category}\n${selectedBrand.desc}`;
  document.getElementById('modalEmail').value = '';
  document.getElementById('modalNotes').value = '';
  document.getElementById('addModal').classList.add('open');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
  selectedBrand = null;
}

function confirmAdd() {
  if (!selectedBrand) return;
  const outreach = JSON.parse(localStorage.getItem('outreach') || '[]');

  if (outreach.find(o => o.brandId === selectedBrand.id)) {
    closeModal();
    window.location.href = 'outreach.html';
    return;
  }

  const entry = {
    id: Date.now().toString(),
    brandId: selectedBrand.id,
    brandName: selectedBrand.name,
    brandCategory: selectedBrand.category,
    brandCountry: selectedBrand.country,
    brandInstagram: selectedBrand.instagram,
    templateType: selectedBrand.templateType,
    emailHint: selectedBrand.emailHint,
    contactEmail: document.getElementById('modalEmail').value.trim(),
    notes: document.getElementById('modalNotes').value.trim(),
    status: 'new',
    addedDate: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };

  outreach.push(entry);
  localStorage.setItem('outreach', JSON.stringify(outreach));
  closeModal();
  showToast(`${selectedBrand.name} added to pipeline`);
  renderBrands();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Filter chips
document.getElementById('filterChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCategory = chip.dataset.cat;
  renderBrands();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderBrands();
});

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) closeModal();
});

renderBrands();
</script>
